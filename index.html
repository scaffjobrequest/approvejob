<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายการงาน</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Prompt', sans-serif;
  background: linear-gradient(135deg, #dbeafe, #fef3c7);
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  cursor: pointer;
}

.title {
  font-weight: 600;
  margin-bottom: 6px;
}

.small {
  font-size: 13px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h2>📋 รายการงาน</h2>
  <div id="list">กำลังโหลด...</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwkz5CYyKDZD56rjjQxZp0G2T-P3Cp9J2BRABI2DLSr4mdv7HDItLueBe6lzZgfop3I/exec";
const LIFF_ID = "2009765392-O6mTRc1m";

// 🔥 ใส่ userId ที่อนุญาต
const allowedUsers = [
  "U895d547fe4e9879d2c3fc07d550d83ec"
];

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  // ❌ ไม่มีสิทธิ์ = หน้าว่าง
  if (!allowedUsers.includes(profile.userId)) {
    document.body.innerHTML = "";
    return;
  }

  loadJobs();
}

async function loadJobs() {
  const res = await fetch(GAS_URL + "?mode=getPending");
  const jobs = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (jobs.length === 0) {
    list.innerHTML = "ไม่มีงาน";
    return;
  }

  jobs.forEach(job => {
    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => {
      window.location.href = "detail.html?jobId=" + job.jobId;
    };

    div.innerHTML = `
      <div class="title">🆔 ${job.jobId}</div>
      <div class="small">${job.action} ${job.type}</div>
      <div>${job.description} ${job.location} ${job.area}</div>
      <div class="small">📅 ${formatDate(job.dueDate)}</div>
    `;

    list.appendChild(div);
  });
}
  
function formatDate(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  return d.toLocaleDateString("th-TH");
}
  
init();
</script>

</body>
</html>
