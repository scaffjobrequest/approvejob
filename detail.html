<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายละเอียดงาน</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Prompt', sans-serif;
  background: linear-gradient(135deg, #dbeafe, #fef3c7);
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  font-size: 15px;
  color: white;
  transition: 0.2s;
}

/* ✅ Approve */
.approve {
  background: #22c55e;
}

.approve:active {
  background: #16a34a;
}

/* ❌ Reject */
.reject {
  background: #ef4444;
}

.reject:active {
  background: #dc2626;
}
</style>
</head>

<body>

<div class="container">
  <div class="card" id="detail">กำลังโหลด...</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwkz5CYyKDZD56rjjQxZp0G2T-P3Cp9J2BRABI2DLSr4mdv7HDItLueBe6lzZgfop3I/exec";
const LIFF_ID = "2009765392-O6mTRc1m";

const allowedUsers = [
  "U895d547fe4e9879d2c3fc07d550d83ec"
];

const jobId = new URLSearchParams(window.location.search).get("jobId");

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  if (!allowedUsers.includes(profile.userId)) {
    document.body.innerHTML = "";
    return;
  }

  loadDetail();
}

async function loadDetail() {
  const res = await fetch(GAS_URL + "?mode=getPending");
  const jobs = await res.json();

  const job = jobs.find(j => String(j.jobId) === String(jobId));

  const div = document.getElementById("detail");

  // 🔥 กันหน้าขาว
  if (!job) {
    div.innerHTML = "❌ ไม่พบข้อมูลงาน";
    return;
  }

  div.innerHTML = `
    <h3>🆔 ${job.jobId}</h3>
    <p>${job.action} ${job.type}</p>
    <p>${job.description} (${job.location})</p>
    <p>Area: ${job.area} </p>
    <p>📅 ${formatDate(job.dueDate)}</p>

    <button class="approve" onclick="approve()">Approve</button>
    <button class="reject" onclick="reject()">Reject</button>
  `;
}

function formatDate(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  return d.toLocaleDateString("th-TH");
}

async function approve() {
  await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ jobId, action: "Approved" })
  });

  alert("อนุมัติแล้ว");
  window.location.href = "approve.html";
}

async function reject() {
  await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ jobId, action: "Rejected" })
  });

  alert("ไม่อนุมัติ");
  window.location.href = "approve.html";
}

init();
</script>

</body>
</html>
